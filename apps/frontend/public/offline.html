<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563EB" />
    <title>MOVI offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
        border: 1px solid #e5e7eb;
        border-radius: 28px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 18px 60px rgba(15, 23, 42, 0.08);
      }

      span {
        display: inline-grid;
        width: 48px;
        height: 48px;
        place-items: center;
        border-radius: 18px;
        background: #eff6ff;
        color: #2563eb;
        font-weight: 800;
      }

      h1 {
        margin: 24px 0 12px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #4b5563;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        margin-top: 24px;
        border-radius: 16px;
        background: #2563eb;
        padding: 12px 16px;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <span>CL</span>
      <h1>Sem conexao no momento</h1>
      <p>O MOVI ainda nao promete uso offline completo. Recarregue quando a internet voltar para consultar dados atualizados de linhas, horarios e rotas.</p>
      <a href="/">Tentar novamente</a>
    </main>
  </body>
</html>
